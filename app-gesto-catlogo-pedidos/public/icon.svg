<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d2318"/>
      <stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>
    <linearGradient id="flower" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ade80"/>
      <stop offset="100%" style="stop-color:#22c55e"/>
    </linearGradient>
  </defs>
  <!-- Background rounded rect -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>
  <!-- Stem -->
  <rect x="248" y="300" width="16" height="140" rx="8" fill="url(#flower)" opacity="0.9"/>
  <!-- Leaf left -->
  <ellipse cx="220" cy="360" rx="36" ry="16" fill="url(#flower)" opacity="0.7" transform="rotate(-30 220 360)"/>
  <!-- Leaf right -->
  <ellipse cx="292" cy="380" rx="36" ry="16" fill="url(#flower)" opacity="0.7" transform="rotate(30 292 380)"/>
  <!-- Center circle -->
  <circle cx="256" cy="218" r="40" fill="#fbbf24"/>
  <!-- Petals -->
  <ellipse cx="256" cy="148" rx="28" ry="48" fill="url(#flower)"/>
  <ellipse cx="256" cy="288" rx="28" ry="48" fill="url(#flower)"/>
  <ellipse cx="186" cy="218" rx="48" ry="28" fill="url(#flower)"/>
  <ellipse cx="326" cy="218" rx="48" ry="28" fill="url(#flower)"/>
  <ellipse cx="207" cy="169" rx="28" ry="48" fill="url(#flower)" transform="rotate(-45 207 169)"/>
  <ellipse cx="305" cy="169" rx="28" ry="48" fill="url(#flower)" transform="rotate(45 305 169)"/>
  <ellipse cx="207" cy="267" rx="28" ry="48" fill="url(#flower)" transform="rotate(45 207 267)"/>
  <ellipse cx="305" cy="267" rx="28" ry="48" fill="url(#flower)" transform="rotate(-45 305 267)"/>
  <!-- Center dot -->
  <circle cx="256" cy="218" r="22" fill="#f59e0b"/>
  <circle cx="256" cy="218" r="10" fill="#fde68a"/>
</svg>
